services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: do-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: do-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch

  coletor:
    build: ./coletor
    container_name: do-coletor
    volumes:
      - ./data:/data
    environment:
      - PDF_DIR=/data/pdfs

  parser:
    build: ./parser
    container_name: do-parser
    volumes:
      - ./data:/data
    environment:
      - PDF_DIR=/data/pdfs
      - TEXT_DIR=/data/textos
    depends_on:
      - coletor

  indexador:
    build: ./indexador
    container_name: do-indexador
    volumes:
      - ./data:/data
    environment:
      - TEXT_DIR=/data/textos
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
    depends_on:
      - opensearch
      - parser

volumes:
  opensearch-data:
